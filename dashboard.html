<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Dashboard | Digital FIR</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/home.css">

    <style>
       /* ===== Citizen Dashboard Header Layout ===== */

.dashboard-header {
    text-align: center;
}

.dashboard-header .header-right {
    display: flex;
    align-items: center;
justify-content: center;
    gap: 16px;
    margin-top: 0;
}

/* bell */
.notification-bar {
    cursor: pointer;
    font-size: 18px;
    position: relative;
}

/* badge on bell */
.notification-bar .badge {
    position: absolute;
    top: -6px;
    right: -10px;
    background: red;
    color: white;
    border-radius: 50%;
    padding: 2px 6px;
    font-size: 12px;
}

/* notification popup */
.notification-box {
    position: absolute;
    margin-top: 0;
    top: 70px;
    right: 20px;
    width: 300px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    padding: 12px;
    z-index: 1000;
}

        .notification-item {
            padding: 6px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="dashboard-container">
    <div class="dashboard-card large" id="top" style="position:relative;">

        <!-- HEADER -->
        <div class="dashboard-header">
            <h2>Citizen Dashboard</h2>
            

            <div class="header-right">
                <span class="role-badge">CITIZEN</span>
                
                <!-- 🔔 NOTIFICATION -->
                <div class="notification-bar" onclick="toggleNotifications()">
                    🔔
                    <span class="badge" id="notifCount" style="display:none">0</span>
                </div>
            </div>
        </div>

        <!-- NOTIFICATION LIST -->
        <div class="notification-box" id="notificationBox" style="display:none">
            <h4>Notifications</h4>
        <button onclick="toggleNotifications()" style="border:none;background:none;font-size:18px;cursor:pointer">
            ✖
        </button>

            <div id="notificationList"></div>
        </div>

        <!-- ACTIONS -->
        <div class="citizen-actions">
            <button class="btn-primary create-fir-btn" onclick="openCreateFir()">
                Create FIR
            </button>

            <button class="myfir-btn" onclick="loadMyFirs()">
                📄<br>
                <span>My<br>FIRs</span>
            </button>
        </div>

        <!-- FIR SECTION -->
        <div class="fir-section" id="firSection" style="display:none">
            <div class="fir-header">
                <h3>My FIR Records</h3>
                <button class="back-btn" onclick="goBack()">⬅ Back</button>
            </div>
            <div class="fir-list" id="firList"></div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/citizen.js"></script>
</body>
</html>
