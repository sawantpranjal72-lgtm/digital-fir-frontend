<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Police Dashboard | Digital FIR</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="police-page">

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <h2>🚓 Digital FIR</h2>
  <ul>
    <li class="active" onclick="showDashboard()">Dashboard</li>
    <li onclick="showFirs()">FIR Records</li>
    <li onclick="showEvidence()">Evidence</li>
    <li onclick="showProfile()">Profile</li>
  </ul>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content">

<!-- ================= DASHBOARD ================= -->
<div id="dashboardSection">

  <div class="dashboard-container">
    <div class="dashboard-card">

      <h2>Police Dashboard</h2>
      <span class="role-badge">POLICE</span>

      <!-- 🔔 Notification Bell -->
    <div class="notification-bar" onclick="toggleNotifications()">
      🔔
      <span class="badge" id="notifCount" style="display:none">0</span>
    </div>
  </div>
</div>

<!-- 🔔 Notification Box -->
<div class="notification-box" id="notificationBox" style="display:none">
  <h4>Notifications</h4>
  <button onclick="toggleNotifications()">✖</button>
  <div id="notificationList"></div>
</div>

      <div class="stats">
        <div class="stat-card blue">Total FIRs <b id="totalCount">0</b></div>
        <div class="stat-card green">Approved <b id="approvedCount">0</b></div>
        <div class="stat-card red">Rejected <b id="rejectedCount">0</b></div>
        <div class="stat-card yellow">Pending <b id="pendingCount">0</b></div>
      </div>

      <input type="text"
             id="firSearch"
             class="fir-search"
             placeholder="Search FIR by ID / Name / Status..." />

      <div class="fir-section">
        <h3>All FIR Records</h3>
        <div class="fir-list" id="firList">Loading...</div>
      </div>

      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- ===== CHARTS ===== -->
  <div class="charts">
    <div class="chart-card">
      <h4>FIR Status Distribution</h4>
      <canvas id="statusPie"></canvas>
    </div>

    <div class="chart-card">
      <h4>FIR Overview</h4>
      <canvas id="statusBar"></canvas>
    </div>
  </div>

</div>

</div>

<!-- ================= MODAL ================= -->
<div id="firModal" class="modal">
  <div class="modal-content">

    <span class="close-btn" onclick="closeModal()">&times;</span>

    <h3>FIR Details</h3>
    <p><b>ID:</b> <span id="modalFirId"></span></p>
    <p><b>Name:</b> <span id="modalName"></span></p>
    <p><b>Status:</b> <span id="modalStatus"></span></p>
    <p id="modalDetails"></p>

    <hr>

    <h3>Evidence</h3>
    <div id="evidenceList"></div>

    <br>
    <button class="btn-secondary" onclick="closeModal()">
      ← Back to FIR List
    </button>

  </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script type="module" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/police.js"></script>

</body>
</html>
