<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Dashboard | Digital FIR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

<div class="dashboard-container">
    <div class="dashboard-card large" id="top">

        <h2>Citizen Dashboard</h2>
        <span class="role-badge">CITIZEN</span>

        <!-- ACTIONS -->
        <div class="citizen-actions">
            <button class="btn-primary create-fir-btn" onclick="openCreateFir()">
                Create FIR
            </button>

            <button class="myfir-btn" onclick="loadMyFirs()">
                📄<br>
                <span>My<br>FIRs</span>
            </button>
        </div>

        <!-- FIR SECTION -->
        <div class="fir-section" id="firSection" style="display:none">

            <div class="fir-header">
                <h3>My FIR Records</h3>
                <button class="back-btn" onclick="goBack()">⬅ Back</button>
            </div>

            <div class="fir-list" id="firList"></div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>
</div>


<script src="js/citizen.js"></script>
</body>
</html>
